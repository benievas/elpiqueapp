# Supabase config — MatchPro
# Docs: https://supabase.com/docs/guides/local-development

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true

[auth]
enabled = true
site_url = "http://localhost:8081"
jwt_expiry = 3600
enable_signup = true

[functions]
# Edge Functions se deployan con:
#   npx supabase functions deploy <nombre>

[functions.mp-webhook]
verify_jwt = false

[functions.create-mp-preference]
verify_jwt = false
